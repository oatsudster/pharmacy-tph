<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลินิกเภสัชกรรม — รพ.ถ้ำพรรณรา</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --primary:#1A5E38;--primary-dark:#124228;--primary-mid:#237A4A;
  --primary-light:#EAF4EE;--gold:#C49A22;--gold-light:#FBF3DC;
  --success:#16a34a;--danger:#b91c1c;--warning:#b45309;
  --info:#0e7490;--info-light:#e0f2fe;
  --ht:#7c3aed;--ht-light:#ede9fe;
  --dm:#0e7490;--dm-light:#e0f2fe;
  --copd:#c2410c;--copd-light:#ffedd5;
  --bg:#F4F7F5;--surface:#fff;--border:#D6E4DA;
  --text:#1C2B22;--text-mid:#3D5A47;--text-light:#7A9A85;
  font-family:'Noto Sans Thai',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;
  display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(26,94,56,.07);flex-shrink:0;position:sticky;top:0;z-index:100;}
.topbar-home{display:flex;align-items:center;gap:6px;text-decoration:none;background:var(--primary);color:#fff;
  padding:6px 13px;border-radius:8px;font-size:13px;font-weight:600;flex-shrink:0;transition:background .2s;}
.topbar-home:hover{background:var(--primary-dark);}
.topbar-title{font-size:17px;font-weight:700;color:var(--primary-dark);flex:1;}
.topbar-badge{background:var(--gold);color:#fff;font-size:12px;font-weight:700;padding:3px 11px;border-radius:20px;flex-shrink:0;}
.sync-badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:#f3f4f6;color:#6b7280;flex-shrink:0;transition:all .3s;}
.topbar-btns{display:flex;gap:6px;}
.tbtn{padding:6px 11px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text-mid);
  font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--primary);color:var(--primary);}

.tab-bar{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 20px;flex-shrink:0;}
.tab-btn{padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;
  color:var(--text-mid);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;font-family:inherit;}
.tab-btn.active,.tab-btn:hover{color:var(--primary);}
.tab-btn.active{border-bottom-color:var(--primary);}
.tab-btn.ht.active,.tab-btn.ht:hover{color:var(--ht);border-bottom-color:var(--ht);}
.tab-btn.dm.active,.tab-btn.dm:hover{color:var(--dm);border-bottom-color:var(--dm);}
.tab-btn.copd.active,.tab-btn.copd:hover{color:var(--copd);border-bottom-color:var(--copd);}

.page-wrap{display:flex;flex:1;overflow:hidden;}
.sidebar-form{width:310px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:14px;overflow-y:auto;height:calc(100vh - 104px);position:sticky;top:104px;}
.main-content{flex:1;padding:18px;overflow-y:auto;}

.form-title{font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:10px;}
.form-group{margin-bottom:8px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:3px;letter-spacing:.02em;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:7px;
  font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border .15s;}
.form-group textarea{resize:vertical;min-height:48px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);background:#fff;}
.input-row{display:flex;gap:5px;align-items:flex-end;}
.input-row>.form-group{flex:1;margin-bottom:0;}
.btn-stamp{padding:6px 8px;background:var(--primary-light);border:1.5px solid var(--border);
  border-radius:7px;font-size:11px;cursor:pointer;flex-shrink:0;font-family:inherit;color:var(--primary);font-weight:600;transition:all .15s;}
.btn-stamp:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-submit{width:100%;padding:8px;background:var(--primary);color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .2s;}
.btn-submit:hover{background:var(--primary-dark);}
.btn-clear{width:100%;padding:6px;background:none;color:var(--text-mid);border:1.5px solid var(--border);
  border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .2s;}
.btn-clear:hover{border-color:var(--danger);color:var(--danger);}
.btn-add{padding:4px 10px;border:1.5px dashed var(--primary);border-radius:6px;background:var(--primary-light);
  color:var(--primary);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-add:hover{background:var(--primary);color:#fff;}
.divider{border:none;border-top:1px solid var(--border);margin:10px 0;}
.section-lbl{font-size:10px;font-weight:700;color:var(--text-light);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}

/* DRP rows */
.drp-row{display:flex;gap:4px;margin-bottom:6px;align-items:flex-start;}
.drp-row .drp-inner{flex:1;display:flex;flex-direction:column;gap:3px;}
.drp-row select,.drp-row input{width:100%;padding:5px 7px;border:1.5px solid var(--border);border-radius:6px;
  font-size:11px;font-family:inherit;background:var(--bg);outline:none;}
.drp-row select:focus,.drp-row input:focus{border-color:var(--primary);}
.btn-rm{padding:4px 7px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);
  color:var(--danger);font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s;}
.btn-rm:hover{background:var(--danger);color:#fff;border-color:var(--danger);}

/* Leftover rows */
.lo-row{display:flex;gap:4px;margin-bottom:5px;align-items:center;}
.lo-row .lo-drug{flex:2;}
.lo-row .lo-qty{width:56px;flex-shrink:0;}
.lo-row .lo-unit{width:40px;flex-shrink:0;font-size:10px;}
.lo-row .lo-price{font-size:10px;color:var(--success);font-weight:700;min-width:38px;text-align:right;flex-shrink:0;}
.lo-row input{padding:5px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;background:var(--bg);outline:none;}
.lo-row input:focus{border-color:var(--primary);}

.lo-total-row{display:flex;justify-content:flex-end;font-size:11px;font-weight:700;color:var(--success);margin-top:4px;}

/* Session section */
.session-toggle{width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);
  color:var(--text-mid);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;
  display:flex;justify-content:space-between;align-items:center;transition:all .15s;}
.session-toggle:hover{border-color:var(--primary-mid);color:var(--primary);}
.session-panel{display:none;margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);}
.session-panel.open{display:block;}
.btn-session{width:100%;padding:7px;background:#4f46e5;color:#fff;border:none;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .2s;}
.btn-session:hover{background:#3730a3;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border-radius:12px;padding:14px 16px;
  box-shadow:0 1px 4px rgba(26,94,56,.07);border:1px solid var(--border);}
.kpi-label{font-size:11px;color:var(--text-mid);font-weight:600;margin-bottom:3px;}
.kpi-val{font-size:26px;font-weight:800;color:var(--primary);line-height:1.1;}
.kpi-val.purple{color:var(--ht);}
.kpi-val.teal{color:var(--dm);}
.kpi-val.orange{color:var(--copd);}
.kpi-val.gold{color:var(--gold);}
.kpi-val.danger{color:var(--danger);}
.kpi-sub{font-size:11px;color:var(--text-light);margin-top:2px;}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:14px;margin-bottom:18px;}
.chart-card{background:var(--surface);border-radius:12px;padding:16px;
  box-shadow:0 1px 4px rgba(26,94,56,.07);border:1px solid var(--border);}
.chart-title{font-size:12px;font-weight:700;color:var(--primary-dark);margin-bottom:12px;}
.chart-wrap{position:relative;height:190px;}

/* Table */
.table-card{background:var(--surface);border-radius:12px;padding:16px;
  box-shadow:0 1px 4px rgba(26,94,56,.07);border:1px solid var(--border);margin-bottom:20px;}
.table-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.table-title{font-size:13px;font-weight:700;color:var(--primary-dark);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.filter-row select,.filter-row input{padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;
  font-size:12px;font-family:inherit;background:var(--bg);outline:none;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px;}
th{background:var(--primary-light);color:var(--primary-dark);font-weight:700;padding:8px 10px;text-align:left;font-size:11px;}
td{padding:7px 10px;border-bottom:1px solid #f0f4f2;vertical-align:top;}
tr:hover td{background:#f8faf9;}
.badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;}
.badge-ht{background:var(--ht-light);color:var(--ht);}
.badge-dm{background:var(--dm-light);color:var(--dm);}
.badge-copd{background:var(--copd-light);color:var(--copd);}
.btn-edit{padding:3px 8px;border:1.5px solid var(--border);border-radius:5px;background:var(--bg);
  font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-edit:hover{border-color:var(--primary);color:var(--primary);}
.btn-del{padding:3px 8px;border:1.5px solid var(--border);border-radius:5px;background:var(--bg);
  font-size:11px;cursor:pointer;font-family:inherit;color:var(--danger);transition:all .15s;}
.btn-del:hover{background:var(--danger);color:#fff;border-color:var(--danger);}

/* Sessions table */
.session-miss{background:#fef2f2;}
.tag-attended{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.tag-missed{background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface);border-radius:14px;padding:22px;width:min(560px,95vw);max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-title{font-size:15px;font-weight:700;color:var(--primary-dark);margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.btn-ok{padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cancel{padding:8px 16px;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-mid);cursor:pointer;font-family:inherit;}

#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1C2B22;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;
  box-shadow:0 4px 12px rgba(0,0,0,.2);}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-home">🏠 หน้าแรก</a>
  <span class="topbar-title">💊 คลินิกเภสัชกรรม</span>
  <span class="topbar-badge" id="badge-year"></span>
  <span class="sync-badge" id="sync-badge">⏳ กำลังโหลด</span>
  <div class="topbar-btns">
    <button class="tbtn" onclick="exportJSON()">📤 Export</button>
    <label class="tbtn"><span>📥 Import</span><input type="file" accept=".json" onchange="importJSON(event)"></label>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn ht active" id="tab-HT" onclick="switchTab('HT')">🫀 คลินิก HT</button>
  <button class="tab-btn dm" id="tab-DM" onclick="switchTab('DM')">🩺 คลินิก DM</button>
  <button class="tab-btn copd" id="tab-COPD" onclick="switchTab('COPD')">🫁 คลินิก COPD</button>
  <button class="tab-btn" id="tab-all" onclick="switchTab('all')">📊 ภาพรวม</button>
  <button class="tab-btn" id="tab-session" onclick="switchTab('session')">📋 บันทึก Session</button>
</div>

<div class="page-wrap">
  <!-- ── SIDEBAR ── -->
  <div class="sidebar-form">
    <div class="form-title">➕ บันทึกการให้คำปรึกษา</div>

    <div class="form-group">
      <label>วันที่</label>
      <div class="input-row">
        <div class="form-group" style="margin:0;flex:1">
          <input type="text" id="f-date" placeholder="วว/ดด/ปป" maxlength="8" oninput="autoDateTH(this)">
        </div>
        <button class="btn-stamp" onclick="document.getElementById('f-date').value=todayTH()">📅</button>
      </div>
    </div>

    <div class="form-group">
      <label>คลินิก</label>
      <select id="f-clinic">
        <option value="HT">🫀 HT (ความดันโลหิตสูง)</option>
        <option value="DM">🩺 DM (เบาหวาน)</option>
        <option value="COPD">🫁 COPD</option>
      </select>
    </div>

    <div class="form-group">
      <label>เภสัชกร</label>
      <select id="f-pharm">
        <option value="">-- เลือกเภสัชกร --</option>
        <option>เภสัชกร ก</option>
        <option>เภสัชกร ข</option>
        <option>เภสัชกร ค</option>
      </select>
    </div>

    <div class="form-group">
      <label>HN ผู้ป่วย</label>
      <input type="text" id="f-hn" placeholder="รหัส HN">
    </div>

    <div class="form-group">
      <label>ชื่อ-สกุล</label>
      <input type="text" id="f-name" placeholder="ชื่อผู้ป่วย">
    </div>

    <hr class="divider">

    <!-- DRP SECTION -->
    <div class="section-lbl">DRPs ที่พบ</div>
    <div id="drp-list"></div>
    <button class="btn-add" onclick="addDrpRow()">+ เพิ่ม DRP</button>

    <hr class="divider">

    <!-- LEFTOVER SECTION -->
    <div class="section-lbl">ยาคงเหลือ (นำกลับมา)</div>
    <div id="lo-list"></div>
    <button class="btn-add" onclick="addLoRow()">+ เพิ่มรายการยา</button>
    <div class="lo-total-row" id="lo-total" style="margin-top:6px"></div>

    <hr class="divider">

    <div class="form-group">
      <label>หมายเหตุ</label>
      <textarea id="f-notes" rows="2" placeholder="บันทึกเพิ่มเติม..."></textarea>
    </div>

    <button class="btn-submit" onclick="submitVisit()">✅ บันทึก</button>
    <button class="btn-clear" onclick="clearForm()">ล้างฟอร์ม</button>

    <hr class="divider">

    <!-- SESSION SECTION -->
    <button class="session-toggle" onclick="toggleSessionPanel()">
      <span>📋 บันทึก Session / ขาดลง</span>
      <span id="session-arrow">▼</span>
    </button>
    <div class="session-panel" id="session-panel">
      <div class="form-group">
        <label>วันที่</label>
        <div class="input-row">
          <div class="form-group" style="margin:0;flex:1">
            <input type="text" id="s-date" placeholder="วว/ดด/ปป" maxlength="8" oninput="autoDateTH(this)">
          </div>
          <button class="btn-stamp" onclick="document.getElementById('s-date').value=todayTH()">📅</button>
        </div>
      </div>
      <div class="form-group">
        <label>คลินิก</label>
        <select id="s-clinic">
          <option value="HT">HT</option>
          <option value="DM">DM</option>
          <option value="COPD">COPD</option>
        </select>
      </div>
      <div class="form-group">
        <label>เภสัชกรลงคลินิก?</label>
        <select id="s-attended" onchange="onAttendedChange()">
          <option value="yes">✅ ลงคลินิก</option>
          <option value="no">❌ ไม่ได้ลง</option>
        </select>
      </div>
      <div id="s-pharm-group" class="form-group">
        <label>เภสัชกร</label>
        <select id="s-pharm">
          <option value="">-- เลือก --</option>
          <option>เภสัชกร ก</option>
          <option>เภสัชกร ข</option>
          <option>เภสัชกร ค</option>
        </select>
      </div>
      <div id="s-reason-group" class="form-group" style="display:none">
        <label>เหตุผล</label>
        <input type="text" id="s-reason" placeholder="เช่น ติดประชุม...">
      </div>
      <div id="s-pm-group" class="form-group">
        <label>จำนวนผู้ป่วย HT บ่าย (ไม่ได้พบเภสัชกร)</label>
        <input type="number" id="s-pm-count" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label>หมายเหตุ</label>
        <input type="text" id="s-notes" placeholder="">
      </div>
      <button class="btn-session" onclick="submitSession()">📋 บันทึก Session</button>
    </div>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <div class="main-content" id="main-content">
    <!-- rendered by JS -->
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title">✏️ แก้ไขรายการ</div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-ok" onclick="saveModal()">บันทึก</button>
    </div>
  </div>
</div>

const TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const FISCAL_MONTHS = ['ต.ค.','พ.ย.','ธ.ค.','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.'];

// ── DATE HELPERS ─────────────────────────────────────────
function todayTH() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()+543).slice(-2);
}
function thToISO(s) {
  if (!s||!s.includes('/')) return s||'';
  const [dd,mm,yy] = s.trim().split('/');
  if (!dd||!mm||!yy) return '';
  const ce = (yy.length<=2 ? 2500+parseInt(yy) : parseInt(yy)) - 543;
  return `${ce}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
}
function autoDateTH(el) {
  let v = el.value.replace(/\D/g,'').slice(0,6);
  if (v.length>4) v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
  else if (v.length>2) v=v.slice(0,2)+'/'+v.slice(2);
  el.value = v;
}
function thDate(s) {
  if (!s) return '-';
  const d = new Date(s); if (isNaN(d)) return s;
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()+543).slice(-2);
}
function fiscalInfo(iso) {
  const d = new Date(iso); if (isNaN(d)) return {year:null,month:null,key:''};
  const m = d.getMonth();
  const y = d.getFullYear()+543;
  const fy = m>=9 ? y+1 : y;
  return {year:fy, month:TH_MONTHS[m], key:iso.slice(0,7)};
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function addDrpRow(type='', cause='', causeNote='') {
  const list = document.getElementById('drp-list');
  const div = document.createElement('div');
  div.className = 'drp-row';
  div.innerHTML = `
    <div class="drp-inner">
      <select class="drp-type" onchange="onDrpTypeChange(this)">
        <option value="">-- เลือก DRP --</option>
        ${DRP_TYPES.map(t=>`<option ${t===type?'selected':''} value="${t}">${t}</option>`).join('')}
      </select>
      <select class="drp-cause" style="display:none">
        <option value="">-- เลือกสาเหตุ --</option>
      </select>
      <input class="drp-cause-note" type="text" placeholder="ระบุสาเหตุ/เพิ่มเติม..." style="display:none" value="${causeNote||cause||''}">
    </div>
    <button class="btn-rm" onclick="this.closest('.drp-row').remove()">✕</button>`;
  list.appendChild(div);
  if (type) {
    const sel = div.querySelector('.drp-type');
    onDrpTypeChange(sel, cause);
  }
}

function onDrpTypeChange(sel, preset='') {
  const row = sel.closest('.drp-row');
  const causeSel = row.querySelector('.drp-cause');
  const causeNote = row.querySelector('.drp-cause-note');
  const t = sel.value;
  const causes = DRP_CAUSES[t];
  if (causes) {
    causeSel.innerHTML = '<option value="">-- สาเหตุ --</option>' + causes.map(c=>`<option ${c===preset?'selected':''} value="${c}">${c}</option>`).join('');
    causeSel.style.display = '';
    causeNote.style.display = 'none';
    causeSel.onchange = () => {
      causeNote.style.display = causeSel.value==='อื่นๆ'?'':'none';
    };
    if (preset==='อื่นๆ') causeNote.style.display = '';
  } else if (t && t!=='--') {
    causeSel.style.display = 'none';
    causeNote.style.display = '';
  } else {
    causeSel.style.display = 'none';
    causeNote.style.display = 'none';
  }
}

function getDrpData() {
  const rows = document.querySelectorAll('.drp-row');
  return [...rows].map(row => {
    const type = row.querySelector('.drp-type').value;
    const causeSel = row.querySelector('.drp-cause');
    const causeNote = row.querySelector('.drp-cause-note');
    const cause = causeSel.style.display!=='none' ? causeSel.value : '';
    const note = causeNote.style.display!=='none' ? causeNote.value.trim() : '';
    return type ? {type, cause, causeNote:note} : null;
  }).filter(Boolean);
}

function onDrugInput(el) {
  const row = el.closest('.lo-row');
  const info = DRUG_PRICES[el.value];
  if (info) {
    row.querySelector('.lo-unit').value = info.u || 'เม็ด';
    row.querySelector('.lo-qty')._price = info.p;
    row.querySelector('.lo-price').textContent = '฿'+info.p;
  } else {
    row.querySelector('.lo-qty')._price = 0;
    row.querySelector('.lo-price').textContent = '฿0';
  }
  updateLoTotal();
}

function updateLoTotal() {
  let total = 0;
  document.querySelectorAll('.lo-row').forEach(row => {
    const qty = parseFloat(row.querySelector('.lo-qty').value)||0;
    const price = row.querySelector('.lo-qty')._price||0;
    total += qty*price;
  });
  const el = document.getElementById('lo-total');
  el.textContent = total>0 ? 'ประมาณการประหยัด: ฿'+total.toFixed(2) : '';
}

function getLoData() {
  return [...document.querySelectorAll('.lo-row')].map(row => {
    const drug = row.querySelector('.lo-drug').value.trim();
    const qty = parseFloat(row.querySelector('.lo-qty').value)||0;
    const unit = row.querySelector('.lo-unit').value.trim();
    const price = row.querySelector('.lo-qty')._price||0;
    return drug||qty ? {drug,qty,unit,priceUnit:price,total:Math.round(qty*price*100)/100} : null;
  }).filter(Boolean);
}

function renderAll() {

function getFilteredVisits(clinic) {
  if (clinic==='all') return visitRecords;
  return visitRecords.filter(r=>r.clinic===clinic);
}
function getFilteredSessions(clinic) {
  if (clinic==='all') return sessionRecords;
  return sessionRecords.filter(r=>r.clinic===clinic);
}

function calcKPIs(clinic) {
  const visits = getFilteredVisits(clinic);
  const sessions = getFilteredSessions(clinic);
  const attended = sessions.filter(s=>s.attended);
  const missed = sessions.filter(s=>!s.attended);
  const withDRP = visits.filter(v=>v.drps&&v.drps.length>0);
  const drpPct = visits.length>0 ? Math.round(withDRP.length/visits.length*1000)/10 : 0;
  const totalSaving = visits.reduce((s,v)=>s+(v.totalSaving||0),0);
  const htPmTotal = sessions.filter(s=>s.clinic==='HT'||clinic!=='all').reduce((s,r)=>s+(r.htPmCount||0),0);
  return {visits:visits.length, attended:attended.length, missed:missed.length,
          withDRP:withDRP.length, drpPct, totalSaving, htPmTotal};
}

          <select id="f-month" onchange="renderTable()">
            <option value="">ทุกเดือน</option>
            ${TH_MONTHS.map(m=>`<option value="${m}">${m}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>วันที่</th><th>HN / ชื่อ</th><th>คลินิก</th><th>DRPs</th><th>ยาคงเหลือ</th><th>ประหยัด</th><th>เภสัชกร</th><th></th></tr></thead>
        <tbody id="tbl-body"></tbody>
      </table></div>
    </div>`;

  renderCharts(clinic);
  renderTable();
}

function renderTable() {
  const q = (document.getElementById('f-search')||{}).value||'';
  const fYear = (document.getElementById('f-year')||{}).value||''
  const fMonth = (document.getElementById('f-month')||{}).value||''
  const clinic = activeTab;

  let recs = getFilteredVisits(clinic).filter(r => {
    if (q && ![r.hn,r.name,...(r.drps||[]).map(d=>d.type)].some(f=>String(f||'').toLowerCase().includes(q.toLowerCase()))) return false;
    const fi = fiscalInfo(r.date);
    if (fYear && String(fi.year)!==fYear) return false;
    if (fMonth && fi.month!==fMonth) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const tbody = document.getElementById('tbl-body');
  if (!tbody) return;
  tbody.innerHTML = recs.map(r => {
    const drpList = (r.drps||[]).map(d=>'<span style="display:block;font-size:10px;color:var(--text-mid)">'+d.type+(d.cause?' → '+d.cause:'')+'</span>').join('');
    const loList = (r.leftovers||[]).map(l=>`<span style="font-size:10px;display:block">${l.drug||''} ${l.qty} ${l.unit}</span>`).join('');
    const badge = `<span class="badge badge-${r.clinic.toLowerCase()}">${r.clinic}</span>`;
    return `<tr>
      <td style="white-space:nowrap">${thDate(r.date)}</td>
      <td><div style="font-weight:600">${r.hn||''}</div><div style="font-size:11px;color:var(--text-mid)">${r.name||''}</div></td>
      <td>${badge}</td>
      <td>${drpList||'<span style="color:var(--text-light);font-size:11px">ไม่พบ</span>'}</td>
      <td>${loList||'<span style="color:var(--text-light);font-size:11px">-</span>'}</td>
      <td style="white-space:nowrap;font-weight:700;color:var(--success)">${r.totalSaving>0?'฿'+r.totalSaving.toFixed(0):''}</td>
      <td style="font-size:11px">${r.pharmacist||''}</td>
      <td style="white-space:nowrap">
        <button class="btn-edit" onclick="editVisit('${r.id}')">✏️</button>
        <button class="btn-del" onclick="deleteVisit('${r.id}')">🗑</button>
      </td></tr>`;
  }).join('');
}

function renderSessionTab(main) {
  const all = [...sessionRecords].sort((a,b)=>b.date.localeCompare(a.date));
  main.innerHTML = `
    <div class="table-card">
      <div class="table-head">
        <span class="table-title">📋 บันทึก Session การลงคลินิก</span>
      </div>
      <div class="tbl-wrap"><table style="min-width:500px">
        <thead><tr><th>วันที่</th><th>คลินิก</th><th>สถานะ</th><th>เภสัชกร</th><th>HT บ่าย</th><th>หมายเหตุ</th><th></th></tr></thead>
        <tbody>${all.map(r=>`<tr class="${r.attended?'':' session-miss'}">
          <td>${thDate(r.date)}</td>
          <td><span class="badge badge-${r.clinic.toLowerCase()}">${r.clinic}</span></td>
          <td>${r.attended?'<span class="tag-attended">✅ ลงคลินิก</span>':`<span class="tag-missed">❌ ไม่ได้ลง</span><div style="font-size:10px;color:var(--danger)">${r.reason||''}</div>`}</td>
          <td style="font-size:12px">${r.pharmacist||''}</td>
          <td style="text-align:center">${r.htPmCount>0?r.htPmCount:''}</td>
          <td style="font-size:11px;color:var(--text-mid)">${r.notes||''}</td>
          <td><button class="btn-del" onclick="deleteSession('${r.id}')">🗑</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

// ── CHARTS ───────────────────────────────────────────────
function destroyChart(id) { if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; } }

function renderCharts(clinic) {
  const visits = getFilteredVisits(clinic);

  // Monthly patient count
  destroyChart('monthly');
  const monthMap = {};
  visits.forEach(v => {
    const fi = fiscalInfo(v.date);
    if (!fi.key) return;
    const label = fi.month+' '+String(fi.year).slice(-2);
    monthMap[label] = (monthMap[label]||0)+1;
  });
  const mLabels = Object.keys(monthMap).slice(-12);
  const mData = mLabels.map(k=>monthMap[k]);
  const clrMap = {HT:'#7c3aed',DM:'#0e7490',COPD:'#c2410c',all:'#1A5E38'};
  const clr = clrMap[clinic]||'#1A5E38';
  const ctx1 = document.getElementById('c-monthly').getContext('2d');
  chartInstances['monthly'] = new Chart(ctx1,{type:'bar',data:{labels:mLabels,datasets:[{label:'ผู้ป่วย',data:mData,backgroundColor:clr+'99',borderColor:clr,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'#e5e7eb'}},x:{ticks:{font:{size:10}}}}}});

  // DRP types
  destroyChart('drp');
  const drpMap = {};
  visits.forEach(v => (v.drps||[]).forEach(d=>{ if(d.type) drpMap[d.type]=(drpMap[d.type]||0)+1; }));
  const drpEntries = Object.entries(drpMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const ctx2 = document.getElementById('c-drp').getContext('2d');
  chartInstances['drp'] = new Chart(ctx2,{type:'bar',data:{labels:drpEntries.map(e=>e[0].length>16?e[0].slice(0,15)+'…':e[0]),datasets:[{data:drpEntries.map(e=>e[1]),backgroundColor:'#f59e0b99',borderColor:'#f59e0b',borderWidth:1.5,borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}}},y:{ticks:{font:{size:10}}}}}});

  // Savings
  destroyChart('saving');
  const savMap = {};
  visits.forEach(v => {
    const fi = fiscalInfo(v.date);
    if (!fi.key) return;
    const label = fi.month+' '+String(fi.year).slice(-2);
    savMap[label] = (savMap[label]||0)+(v.totalSaving||0);
  });
  const sLabels = mLabels;
  const sData = sLabels.map(k=>Math.round(savMap[k]||0));
  const ctx3 = document.getElementById('c-saving').getContext('2d');
  chartInstances['saving'] = new Chart(ctx3,{type:'bar',data:{labels:sLabels,datasets:[{label:'฿',data:sData,backgroundColor:'#16a34a55',borderColor:'#16a34a',borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>'฿'+v.toLocaleString()},grid:{color:'#e5e7eb'}},x:{ticks:{font:{size:10}}}}}});
}

// ── STORAGE ──────────────────────────────────────────────
function saveLocal() {
  localStorage.setItem('clinic_visits', JSON.stringify(visitRecords));
  localStorage.setItem('clinic_sessions', JSON.stringify(sessionRecords));
}
function loadLocal() {
  visitRecords = JSON.parse(localStorage.getItem('clinic_visits')||'[]');
  sessionRecords = JSON.parse(localStorage.getItem('clinic_sessions')||'[]');
}

// ── EXPORT / IMPORT ───────────────────────────────────────
function exportJSON() {
  const d = new Date(); const ts = d.toISOString().slice(0,10);
  const data = {version:1,exported:d.toISOString(),visitRecords,sessionRecords};
  const url = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  const a = Object.assign(document.createElement('a'),{href:url,download:'clinic_backup_'+ts+'.json'});
  a.click(); URL.revokeObjectURL(url);
}
function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.visitRecords) visitRecords = data.visitRecords;
      if (data.sessionRecords) sessionRecords = data.sessionRecords;
      saveLocal(); fbSave(); renderAll();
      showToast('✅ Import สำเร็จ — '+visitRecords.length+' รายการ');
    } catch { showToast('❌ ไฟล์ไม่ถูกต้อง'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

let db;
function initFirebase() {
  try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.firestore();
    const badge = document.getElementById('sync-badge');
    db.collection('pharmacy_tph').doc('clinic_data').onSnapshot(snap => {
      if (snap.exists) {
        const d = snap.data();
        if (d.visitRecords) visitRecords = d.visitRecords;
        if (d.sessionRecords) sessionRecords = d.sessionRecords;
        saveLocal(); renderAll();
        badge.textContent='☁️ ซิงค์แล้ว'; badge.style.background='#dcfce7'; badge.style.color='#15803d';
      } else {
        badge.textContent='⚠️ ไม่พบข้อมูล'; badge.style.background='#fef9c3'; badge.style.color='#854d0e';
      }
    }, err => {
      badge.textContent='📴 ออฟไลน์'; badge.style.background='#fee2e2'; badge.style.color='#991b1b';
    });
  } catch(e) { console.warn('Firebase:',e); }
}
function fbSave() {
  if (!db) return;
  db.collection('pharmacy_tph').doc('clinic_data').set({visitRecords,sessionRecords,updated:Date.now()})
    .catch(e=>console.warn('FB save:',e));
}
