name: แจ้งเตือนยาใกล้หมดอายุ (Telegram)

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 น. เวลาไทย (UTC+7) — cron ของ GitHub Actions เป็น UTC เท่านั้น
  workflow_dispatch: {}    # กดรันเองได้จากแท็บ Actions เพื่อทดสอบ ไม่ต้องรอถึงเช้า

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node .github/scripts/notify-expiry.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
