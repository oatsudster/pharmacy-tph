name: แจ้งเตือนยาใกล้หมดอายุ (Telegram)

on:
  schedule:
    - cron: '30 21 * * *'  # ตั้งไว้ 21:30 UTC (04:30 น. เวลาไทย) เผื่อเวลาหน่วงของ GitHub Actions ~3-3.5 ชม. เพื่อให้แจ้งจริงใกล้เคียง 08:00 น. เวลาไทยมากที่สุด
  workflow_dispatch: {}    # กดรันเองได้จากแท็บ Actions เพื่อทดสอบ ไม่ต้องรอถึงเช้า

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node .github/scripts/notify-expiry.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
