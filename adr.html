<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบรายงาน ADR — รพ.ถ้ำพรรณรา</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --primary: #1A5E38; --primary-dark: #124228; --primary-mid: #237A4A;
  --primary-light: #EAF4EE; --gold: #C49A22; --gold-light: #FBF3DC;
  --success: #16a34a; --danger: #b91c1c; --warning: #b45309;
  --info: #0e7490; --info-light: #e0f2fe;
  --bg: #F4F7F5; --surface: #ffffff; --border: #D6E4DA;
  --text: #1C2B22; --text-mid: #3D5A47; --text-light: #7A9A85;
  font-family: 'Noto Sans Thai', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* ── TOPBAR ── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 1px 4px rgba(26,94,56,.07); flex-shrink: 0; position: sticky; top: 0; z-index: 100;
}
.topbar-home {
  display: flex; align-items: center; gap: 6px; text-decoration: none;
  background: var(--primary); color: #fff;
  padding: 6px 13px; border-radius: 8px; font-size: 13px; font-weight: 600; flex-shrink: 0;
  transition: background .2s;
}
.topbar-home:hover { background: var(--primary-dark); }
.topbar-title { font-size: 17px; font-weight: 700; color: var(--primary-dark); flex: 1; }
.topbar-badge { background: var(--gold); color: #fff; font-size: 12px; font-weight: 700; padding: 3px 11px; border-radius: 20px; flex-shrink: 0; }
.sync-badge {
  font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
  background: #f3f4f6; color: #6b7280; flex-shrink: 0; transition: all .3s;
}
.topbar-btns { display: flex; gap: 6px; }
.tbtn {
  padding: 6px 11px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text-mid); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap;
}
.tbtn:hover { border-color: var(--primary); color: var(--primary); }
.tbtn label { cursor: pointer; }
.tbtn input[type=file] { display: none; }

/* ── TABS ── */
.tab-bar {
  display: flex; background: var(--surface);
  border-bottom: 2px solid var(--border); padding: 0 20px; flex-shrink: 0;
}
.tab-btn {
  padding: 11px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
  border: none; background: none; color: var(--text-mid);
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all .18s; font-family: inherit;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn:hover:not(.active) { color: var(--primary); }

/* ── LAYOUT ── */
.page-wrap { display: flex; flex: 1; overflow: hidden; }
.sidebar-form {
  width: 290px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); padding: 16px;
  overflow-y: auto; height: calc(100vh - 104px); position: sticky; top: 104px;
}
.main-content { flex: 1; padding: 18px; overflow-y: auto; }

/* ── FORM ── */
.form-title { font-size: 14px; font-weight: 700; color: var(--primary-dark); margin-bottom: 12px; }
.form-group { margin-bottom: 9px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-mid); margin-bottom: 3px; letter-spacing: .02em; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 7px 9px; border: 1.5px solid var(--border);
  border-radius: 7px; font-size: 13px; font-family: inherit;
  background: var(--bg); color: var(--text); outline: none; transition: border .15s;
}
.form-group textarea { resize: vertical; min-height: 56px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); background: #fff; }
.input-row { display: flex; gap: 5px; align-items: flex-end; }
.input-row > .form-group { flex: 1; margin-bottom: 0; }
.btn-stamp {
  padding: 7px 9px; background: var(--primary-light); border: 1.5px solid var(--border);
  border-radius: 7px; font-size: 12px; cursor: pointer; flex-shrink: 0;
  font-family: inherit; color: var(--primary); font-weight: 600; transition: all .15s;
}
.btn-stamp:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.section-lbl { font-size: 10px; font-weight: 700; color: var(--text-light); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.btn-submit {
  width: 100%; padding: 9px; background: var(--primary); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-top: 4px; transition: background .2s;
}
.btn-submit:hover { background: var(--primary-dark); }
.btn-clear {
  width: 100%; padding: 6px; background: none; color: var(--text-mid);
  border: 1.5px solid var(--border); border-radius: 8px; font-size: 12px;
  font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 5px; transition: all .2s;
}
.btn-clear:hover { border-color: var(--danger); color: var(--danger); }
#symptom-group { display: none; }

/* ── KPI ── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.kpi-card {
  background: var(--surface); border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(26,94,56,.07); border: 1px solid var(--border);
}
.kpi-label { font-size: 11px; color: var(--text-mid); font-weight: 600; margin-bottom: 3px; }
.kpi-val { font-size: 26px; font-weight: 800; color: var(--primary); line-height: 1.1; }
.kpi-val.gold { color: var(--gold); }
.kpi-val.danger { color: var(--danger); }
.kpi-val.info { color: var(--info); }
.kpi-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }

/* ── CHARTS ── */
.chart-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; margin-bottom: 18px; }
.chart-card {
  background: var(--surface); border-radius: 12px; padding: 16px;
  box-shadow: 0 1px 4px rgba(26,94,56,.07); border: 1px solid var(--border);
}
.chart-title { font-size: 13px; font-weight: 700; color: var(--primary-dark); margin-bottom: 12px; }
.chart-wrap { position: relative; height: 200px; }

/* ── TABLE ── */
.table-card {
  background: var(--surface); border-radius: 12px; padding: 16px;
  box-shadow: 0 1px 4px rgba(26,94,56,.07); border: 1px solid var(--border);
  margin-bottom: 20px;
}
.table-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.table-title { font-size: 13px; font-weight: 700; color: var(--primary-dark); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-row select, .filter-row input {
  padding: 5px 8px; border: 1.5px solid var(--border); border-radius: 6px;
  font-size: 12px; font-family: inherit; background: var(--bg); outline: none;
}
.filter-row select:focus, .filter-row input:focus { border-color: var(--primary); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 780px; }
th { background: var(--primary-light); color: var(--primary-dark); font-weight: 700; padding: 8px 9px; text-align: left; white-space: nowrap; }
td { padding: 7px 9px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }
tr.missing-symptom td { background: #fffbeb; }
tr.missing-symptom:hover td { background: #fef3c7; }

/* ── BADGES ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-a { background: #dbeafe; color: #1e40af; }
.badge-b { background: #fce7f3; color: #9d174d; }
.badge-g6pd { background: #fef3c7; color: #92400e; }
.badge-mild { background: #d1fae5; color: #065f46; }
.badge-mod { background: #fef3c7; color: #92400e; }
.badge-sev { background: #fee2e2; color: #991b1b; }
.badge-na { background: #f3f4f6; color: #6b7280; }
.badge-warn { background: #fef3c7; color: #92400e; }

.btn-del { background: none; border: none; cursor: pointer; color: #ef4444; font-size: 14px; padding: 2px 5px; border-radius: 4px; }
.btn-del:hover { background: #fee2e2; }
.btn-edit { background: none; border: none; cursor: pointer; color: var(--primary); font-size: 14px; padding: 2px 5px; border-radius: 4px; }
.btn-edit:hover { background: var(--primary-light); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
.empty-state p { font-size: 14px; margin-bottom: 4px; }
.empty-state small { font-size: 12px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--primary); color: #fff; padding: 11px 18px;
  border-radius: 10px; font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(26,94,56,.25); display: none;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000;
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface); border-radius: 16px; padding: 22px; width: 460px;
  max-width: 95vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--primary-dark); margin-bottom: 14px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.btn-ok { padding: 8px 18px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-cancel { padding: 8px 18px; background: var(--bg); color: var(--text-mid); border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="https://oatsudster.github.io/pharmacy-tph/" class="topbar-home">🏠 หน้าหลัก</a>
  <div class="topbar-title">⚠️ ระบบรายงาน ADR</div>
  <div class="topbar-badge">รพ.ถ้ำพรรณรา</div>
  <div class="topbar-btns">
    <div class="tbtn"><label>📥 Import HosXP<input type="file" accept=".xls,.xlsx" onchange="importHosXP(this)"></label></div>
    <button class="tbtn" onclick="exportJSON()">💾 Export</button>
    <div class="tbtn"><label>📂 Import JSON<input type="file" accept=".json" onchange="importJSON(this)"></label></div>
  </div>
  <span class="sync-badge" id="sync-badge">⏳ กำลังเชื่อมต่อ...</span>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('all',this)">📋 ทั้งหมด</button>
  <button class="tab-btn" onclick="switchTab('A',this)">💊 Type A</button>
  <button class="tab-btn" onclick="switchTab('B',this)">🌡️ Type B</button>
  <button class="tab-btn" onclick="switchTab('G6PD',this)">🧬 G6PD</button>
</div>

<!-- LAYOUT -->
<div class="page-wrap">
  <!-- SIDEBAR FORM -->
  <div class="sidebar-form">
    <div class="form-title" id="form-title">➕ เพิ่มรายการ ADR</div>
    <input type="hidden" id="edit-id">

    <div class="form-group">
      <label>วันที่รายงาน</label>
      <div class="input-row">
        <div class="form-group"><input type="text" id="f-date" placeholder="วว/ดด/ปป" maxlength="8" oninput="autoDateTH(this)"></div>
        <button class="btn-stamp" onclick="document.getElementById('f-date').value=todayTH()">📅</button>
      </div>
    </div>
    <div class="form-group">
      <label>HN</label>
      <input type="text" id="f-hn" placeholder="รหัสผู้ป่วย">
    </div>
    <div class="form-group">
      <label>ชื่อ-สกุล</label>
      <input type="text" id="f-name" placeholder="ชื่อผู้ป่วย">
    </div>

    <div class="form-group">
      <label>AN (IPD)</label>
      <input type="text" id="f-an" placeholder="เลขผู้ป่วยใน (ถ้ามี)">
    </div>

    <hr class="divider">
    <div class="section-lbl">รายละเอียด ADR</div>

    <div class="form-group">
      <label>ชนิดรายงาน *</label>
      <select id="f-type" onchange="onTypeChange()">
        <option value="">-- เลือกชนิด --</option>
        <option value="A">Type A — ผลข้างเคียง</option>
        <option value="B">Type B — แพ้ยา</option>
        <option value="G6PD">G6PD</option>
      </select>
    </div>

    <div class="form-group" id="symptom-group">
      <label>ลักษณะอาการ</label>
      <select id="f-symptom">
        <option value="">-- เลือกอาการ --</option>
      </select>
    </div>

    <div class="form-group">
      <label>รายการยา/ผลิตภัณฑ์ *</label>
      <input type="text" id="f-drug" placeholder="ชื่อยา" list="drug-dl-adr">
      <datalist id="drug-dl-adr"></datalist>
    </div>
    <div class="form-group">
      <label>ประเภทผลิตภัณฑ์</label>
      <select id="f-prodtype">
        <option>ยา</option><option>เครื่องสำอาง</option>
        <option>ผลิตภัณฑ์เสริมอาหาร</option><option>อื่นๆ</option>
      </select>
    </div>
    <div class="form-group">
      <label>ความร้ายแรง</label>
      <select id="f-sev">
        <option value="ไม่ร้ายแรง (Non-serious)">ไม่ร้ายแรง (Non-serious)</option>
        <option value="ร้ายแรง - เสียชีวิต (Death)">ร้ายแรง - เสียชีวิต (Death)</option>
        <option value="ร้ายแรง - อันตรายถึงชีวิต (Life-threatening)">ร้ายแรง - อันตรายถึงชีวิต (Life-threatening)</option>
        <option value="ร้ายแรง - ต้องเข้ารับการรักษาในโรงพยาบาล (Hospitalization-initial)">ร้ายแรง - ต้องเข้ารับการรักษาในโรงพยาบาล (Hospitalization-initial)</option>
        <option value="ร้ายแรง - ทำให้เพิ่มระยะเวลาในการรักษานานขึ้น (Hospitalization-prolonged)">ร้ายแรง - ทำให้เพิ่มระยะเวลาในการรักษานานขึ้น (Hospitalization-prolonged)</option>
        <option value="ร้ายแรง - พิการ (Disability)">ร้ายแรง - พิการ (Disability)</option>
        <option value="ร้ายแรง - เป็นเหตุให้เกิดความผิดปกติแต่กำเนิด (Congenital anomaly)">ร้ายแรง - เป็นเหตุให้เกิดความผิดปกติแต่กำเนิด (Congenital anomaly)</option>
        <option value="ยังไม่ทราบ">ยังไม่ทราบ</option>
      </select>
    </div>
    <div class="form-group">
      <label>ผลวินิจฉัย / รายละเอียดอาการ</label>
      <textarea id="f-diag" placeholder="อาการที่เกิดขึ้น..."></textarea>
    </div>

    <button class="btn-submit" onclick="submitForm()">✅ บันทึก</button>
    <button class="btn-clear" onclick="resetForm()">🔄 ล้างแบบฟอร์ม</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <!-- KPI -->
    <div class="kpi-grid" id="kpi-grid"></div>
    <!-- CHARTS -->
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title" id="chart-monthly-title">จำนวน ADR รายเดือน (ปีงบประมาณ)</div>
        <div class="chart-wrap"><canvas id="chart-monthly"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title" id="chart-symptom-title">ลักษณะอาการ (Top 8)</div>
        <div class="chart-wrap"><canvas id="chart-symptom"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">ยาที่พบบ่อย (Top 8)</div>
        <div class="chart-wrap"><canvas id="chart-drug"></canvas></div>
      </div>
    </div>
    <!-- TABLE -->
    <div class="table-card">
      <div class="table-head">
        <div class="table-title">รายการ ADR</div>
        <div class="filter-row">
          <select id="fil-year" onchange="renderAll()"></select>
          <select id="fil-month" onchange="renderAll()">
            <option value="">ทุกเดือน</option>
            <option>ต.ค.</option><option>พ.ย.</option><option>ธ.ค.</option>
            <option>ม.ค.</option><option>ก.พ.</option><option>มี.ค.</option>
            <option>เม.ย.</option><option>พ.ค.</option><option>มิ.ย.</option>
            <option>ก.ค.</option><option>ส.ค.</option><option>ก.ย.</option>
          </select>
          <select id="fil-sev" onchange="renderAll()">
            <option value="">ทุกระดับ</option>
            <option value="">ทุกระดับ</option>
            <option>ไม่ร้ายแรง (Non-serious)</option>
            <option>ร้ายแรง - เสียชีวิต (Death)</option>
            <option>ร้ายแรง - อันตรายถึงชีวิต (Life-threatening)</option>
            <option>ร้ายแรง - ต้องเข้ารับการรักษาในโรงพยาบาล (Hospitalization-initial)</option>
            <option>ร้ายแรง - ทำให้เพิ่มระยะเวลาในการรักษานานขึ้น (Hospitalization-prolonged)</option>
            <option>ร้ายแรง - พิการ (Disability)</option>
            <option>ร้ายแรง - เป็นเหตุให้เกิดความผิดปกติแต่กำเนิด (Congenital anomaly)</option>
          </select>
          <input type="text" id="fil-q" placeholder="🔍 HN/ชื่อ/ยา" oninput="renderAll()">
        </div>
      </div>
      <div class="tbl-wrap" id="tbl-wrap"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title">✏️ แก้ไขรายการ</div>
    <div class="form-group">
      <label>ชนิดรายงาน (ADR Type)</label>
      <select id="m-type" onchange="onModalTypeChange()">
        <option value="">-- เลือกชนิด --</option>
        <option value="A">Type A — ผลข้างเคียง</option>
        <option value="B">Type B — แพ้ยา</option>
        <option value="G6PD">G6PD</option>
      </select>
    </div>
    <div class="form-group">
      <label>ลักษณะอาการ</label>
      <select id="m-symptom"></select>
    </div>
    <div class="form-group">
      <label>รายการยา</label>
      <input type="text" id="m-drug" list="drug-dl-adr">
    </div>
    <div class="form-group">
      <label>ความร้ายแรง</label>
      <select id="m-sev">
        <option value="ไม่ร้ายแรง (Non-serious)">ไม่ร้ายแรง (Non-serious)</option>
        <option value="ร้ายแรง - เสียชีวิต (Death)">ร้ายแรง - เสียชีวิต (Death)</option>

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().slice(0,10); }
// ── Thai Date Helpers (พ.ศ. DD/MM/YY) ────────
function todayTH() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()+543).slice(-2);
}
function thToISO(s) {
  if (!s || !s.includes('/')) return s||'';
  const [dd,mm,yy] = s.trim().split('/');
  if (!dd||!mm||!yy) return '';
  const ce = (yy.length<=2 ? 2500+parseInt(yy) : parseInt(yy)) - 543;
  return `${ce}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
}
function autoDateTH(el) {
  let v = el.value.replace(/\D/g,'').slice(0,6);
  if (v.length>4) v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
  else if (v.length>2) v=v.slice(0,2)+'/'+v.slice(2);
  el.value = v;
}
// ─────────────────────────────────────────────

function showToast(msg, dur=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display='none', dur);
}

function thDate(s) {
  if (!s) return '-';
  const d = new Date(s); if (isNaN(d)) return s;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()+543).slice(-2);
  return `${dd}/${mm}/${yy}`;
}

function fiscalInfo(dateStr) {
  const d = new Date(dateStr); if (isNaN(d)) return { year:null, month:null };
  const m = d.getMonth(); // 0-11
  const y = d.getFullYear() + 543;
  const fy = m >= 9 ? y + 1 : y;
  return { year: fy, month: TH_MONTHS[m], fyIdx: FISCAL_MONTHS.indexOf(TH_MONTHS[m]) };
}

function excelToDate(serial) {
  if (!serial || typeof serial !== 'number') return '';
  const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
  return d.toISOString().slice(0,10);
}

// ═══ IMPORT HOSXP EXCEL ═════════════════════════════════════════
async function importHosXP(input) {
  const file = input.files[0]; if (!file) return;
  input.value = '';
  showToast('📥 กำลัง import...', 10000);
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array', cellDates:false });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });

    // Find header row
    let hRow = 0;
    for (let i=0; i<Math.min(6,rows.length); i++) {
      if (rows[i].some(c=>String(c).includes('HN')||String(c).includes('วันที่'))) { hRow=i; break; }
    }
    const headers = rows[hRow].map(h=>String(h).trim());
    const col = (name) => headers.findIndex(h=>h.includes(name));

    const cDate=col('วันที่'), cHN=col('HN'), cName=col('ชื่อ'), cDept=col('แผนก'),
          cAN=col('AN'), cDiag=col('ผลวินิจฉัย'), cType=col('ชนิด'),
          cProd=col('ประเภทผลิต'), cSev=col('ความร้ายแรง'), cDrug=col('รายการผลิต');

    const mapType = v => {
      const s = String(v).toLowerCase();
      if (s.includes('g6pd')) return 'G6PD';
      if (s.includes('type b')||s.includes('แพ้')||/\bb\b/.test(s)) return 'B';
      if (s.includes('type a')||s.includes('ข้างเคียง')||/\ba\b/.test(s)) return 'A';
      return '';
    };
    const SEV_MAP = [
      ['ไม่ร้ายแรง (Non-serious)', ['ไม่ร้ายแรง','non-serious','ไม่รุนแรง']],
      ['ร้ายแรง - เสียชีวิต (Death)', ['เสียชีวิต','death']],
      ['ร้ายแรง - อันตรายถึงชีวิต (Life-threatening)', ['อันตรายถึงชีวิต','life-threat','อัตรายถึงชีวิต']],
      ['ร้ายแรง - ต้องเข้ารับการรักษาในโรงพยาบาล (Hospitalization-initial)', ['hospitalization-initial','เข้ารับการรักษา','ต้องเข้า']],
      ['ร้ายแรง - ทำให้เพิ่มระยะเวลาในการรักษานานขึ้น (Hospitalization-prolonged)', ['hospitalization-prolonged','เพิ่มระยะเวลา','prolonged']],
      ['ร้ายแรง - พิการ (Disability)', ['พิการ','disability']],
      ['ร้ายแรง - เป็นเหตุให้เกิดความผิดปกติแต่กำเนิด (Congenital anomaly)', ['แต่กำเนิด','congenital']],
    ];
    const mapSev = v => {
      const s = String(v).trim();
      for (const [canonical, keys] of SEV_MAP) {
        if (s === canonical || keys.some(k => s.toLowerCase().includes(k.toLowerCase()))) return canonical;
      }
      return s || 'ยังไม่ทราบ';
    };
    const getDate = raw => {
      if (!raw) return '';
      if (typeof raw==='number'&&raw>1000) return excelToDate(raw);
      const s = String(raw);
      if (s.match(/\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
      return s;
    };

    let imported=0, skipped=0;
    for (let i=hRow+1; i<rows.length; i++) {
      const r = rows[i]; if (!r||r.every(c=>!c)) continue;
      const dateStr = getDate(cDate>=0?r[cDate]:'');
      const hn = cHN>=0?String(r[cHN]).trim():'';
      const drug = cDrug>=0?String(r[cDrug]).trim():'';
      if (records.some(x=>x.date===dateStr&&x.hn===hn&&x.drug===drug)) { skipped++; continue; }

      records.unshift({
        id: uid(), date: dateStr, hn,
        name: cName>=0?String(r[cName]).trim():'',
        dept: cDept>=0?String(r[cDept]).trim():'',
        an: cAN>=0?String(r[cAN]).trim():'',
        type: mapType(cType>=0?r[cType]:''),
        symptom: '',
        drug,
        productType: cProd>=0?String(r[cProd]).trim():'ยา',
        severity: mapSev(cSev>=0?r[cSev]:''),
        diagnosis: cDiag>=0?String(r[cDiag]).trim():'',
        source: 'hosxp', created: Date.now()
      });
      imported++;
    }
    saveLocal(); window.fbSaveADR && fbSaveADR();
    renderAll();
    showToast(`✅ Import ${imported} รายการ (ข้าม ${skipped} ซ้ำ)${imported?'\n⚠️ กรุณาระบุลักษณะอาการให้ครบ':''}`, 4000);
  } catch(e) { showToast('❌ เกิดข้อผิดพลาด: '+e.message); console.error(e); }
}

// ═══ EXPORT / IMPORT JSON ═══════════════════════════════════════
function exportJSON() {
  const blob = new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),records},null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url;
  a.download='ADR_backup_'+today()+'.json'; a.click(); URL.revokeObjectURL(url);
  showToast('✅ Export สำเร็จ');
}

function importJSON(input) {
  const file = input.files[0]; if (!file) return; input.value='';
  const rd = new FileReader();
  rd.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const arr = data.records||data;
      if (!Array.isArray(arr)) throw new Error('รูปแบบไม่ถูกต้อง');
      records = arr; saveLocal();
      window.fbSaveADR && fbSaveADR(); renderAll();
      showToast(`✅ Import ${records.length} รายการ`);
    } catch(err) { showToast('❌ ไฟล์ไม่ถูกต้อง: '+err.message); }
  };
  rd.readAsText(file);
}

function getTabRecs() {

function getFiltered(base) {
  const year = document.getElementById('fil-year').value;
  const month = document.getElementById('fil-month').value;
  const sev = document.getElementById('fil-sev').value;
  const q = document.getElementById('fil-q').value.toLowerCase();
  return base.filter(r => {
    const fi = fiscalInfo(r.date);
    if (year && String(fi.year)!==year) return false;
    if (month && fi.month!==month) return false;
    if (sev && r.severity!==sev) return false;
    if (q && ![r.hn,r.name,r.drug,r.symptom].some(f=>String(f||'').toLowerCase().includes(q))) return false;
    return true;
  });
}

// ═══ KPI ════════════════════════════════════════════════════════
function renderKPI(tabRecs, fRecs) {
  const now = new Date();
  const curFYMonth = TH_MONTHS[now.getMonth()];
  const thisMonth = fRecs.filter(r=>fiscalInfo(r.date).month===curFYMonth);
  const severe = fRecs.filter(r=>r.severity && r.severity.startsWith('ร้ายแรง')).length;
  const noSym = fRecs.filter(r=>!r.symptom).length;
  const counts = {A:tabRecs.filter(r=>r.type==='A').length, B:tabRecs.filter(r=>r.type==='B').length, G6PD:tabRecs.filter(r=>r.type==='G6PD').length};

  const kpi4 = currentTab==='all'
    ? `<div class="kpi-card"><div class="kpi-label">Type A / B / G6PD</div><div class="kpi-val" style="font-size:18px">${counts.A} / ${counts.B} / ${counts.G6PD}</div><div class="kpi-sub">จำนวนแต่ละชนิด</div></div>`
    : `<div class="kpi-card"><div class="kpi-label">ยังไม่ระบุอาการ</div><div class="kpi-val ${noSym?'gold':''}">${noSym}</div><div class="kpi-sub">รายการที่ต้องระบุเพิ่ม</div></div>`;

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">ADR ทั้งหมด (${{'all':'ทั้งหมด','A':'Type A','B':'Type B','G6PD':'G6PD'}[currentTab]})</div>
      <div class="kpi-val">${fRecs.length}</div>
      <div class="kpi-sub">รายการที่กรอง</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">เดือน${curFYMonth.replace('.','')}</div>
      <div class="kpi-val gold">${thisMonth.length}</div>
      <div class="kpi-sub">รายการ</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">ร้ายแรง (Serious)</div>
      <div class="kpi-val ${severe?'danger':''}">${severe}</div>
      <div class="kpi-sub">รายการ</div>
    </div>
    ${kpi4}
  `;
}

// ═══ CHARTS ══════════════════════════════════════════════════════
const CHART_COLORS = {
  A: 'rgba(30,86,200,0.75)', B: 'rgba(157,23,77,0.75)', G6PD: 'rgba(146,64,14,0.75)',
  all: 'rgba(26,94,56,0.75)'
};

function renderCharts(recs) {
  // Monthly data
  const mCount = {};
  const mCountA = {}, mCountB = {}, mCountG = {};
  FISCAL_MONTHS.forEach(m => { mCount[m]=0; mCountA[m]=0; mCountB[m]=0; mCountG[m]=0; });
  recs.forEach(r => {
    const {month} = fiscalInfo(r.date);
    if (month && mCount[month]!==undefined) {
      mCount[month]++;
      if (r.type==='A') mCountA[month]++;
      else if (r.type==='B') mCountB[month]++;
      else if (r.type==='G6PD') mCountG[month]++;
    }
  });

  const mCtx = document.getElementById('chart-monthly').getContext('2d');
  if (charts.monthly) charts.monthly.destroy();
  const datasets = currentTab==='all' ? [
    { label:'Type A', data: FISCAL_MONTHS.map(m=>mCountA[m]), backgroundColor: CHART_COLORS.A, borderRadius:3 },
    { label:'Type B', data: FISCAL_MONTHS.map(m=>mCountB[m]), backgroundColor: CHART_COLORS.B, borderRadius:3 },
    { label:'G6PD',  data: FISCAL_MONTHS.map(m=>mCountG[m]),  backgroundColor: CHART_COLORS.G6PD, borderRadius:3 }
  ] : [{ label:'จำนวน', data: FISCAL_MONTHS.map(m=>mCount[m]), backgroundColor: CHART_COLORS[currentTab]||CHART_COLORS.all, borderRadius:3 }];

  charts.monthly = new Chart(mCtx, {
    type: 'bar',
    data: { labels: FISCAL_MONTHS, datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: { legend: { display: currentTab==='all', position:'bottom', labels:{boxWidth:12,font:{size:11}} } },
      scales: { x:{stacked:currentTab==='all'}, y:{stacked:currentTab==='all',beginAtZero:true,ticks:{stepSize:1}} }
    }
  });

  // Symptom top 8
  const sCounts = {};
  recs.forEach(r => { if(r.symptom) sCounts[r.symptom]=(sCounts[r.symptom]||0)+1; });
  const topS = Object.entries(sCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const sCtx = document.getElementById('chart-symptom').getContext('2d');
  if (charts.symptom) charts.symptom.destroy();
  if (!topS.length) {
    sCtx.clearRect(0,0,sCtx.canvas.width,sCtx.canvas.height);
    sCtx.fillStyle='#9ca3af'; sCtx.font='14px Noto Sans Thai,sans-serif';
    sCtx.textAlign='center'; sCtx.fillText('ยังไม่มีข้อมูลอาการ',sCtx.canvas.width/2,sCtx.canvas.height/2);
  } else {
    charts.symptom = new Chart(sCtx, {
      type:'bar',
      data:{ labels:topS.map(([s])=>s.length>22?s.slice(0,20)+'…':s), datasets:[{ label:'จำนวน', data:topS.map(([,c])=>c), backgroundColor:'rgba(14,116,144,0.75)', borderRadius:3 }] },
      options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true,ticks:{stepSize:1}}} }
    });
  }

  // Drug top 8
  const dCounts = {};
  recs.forEach(r => { if(r.drug) dCounts[r.drug]=(dCounts[r.drug]||0)+1; });
  const topD = Object.entries(dCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const dCtx = document.getElementById('chart-drug').getContext('2d');
  if (charts.drug) charts.drug.destroy();
  if (!topD.length) {
    dCtx.clearRect(0,0,dCtx.canvas.width,dCtx.canvas.height);
    dCtx.fillStyle='#9ca3af'; dCtx.font='14px Noto Sans Thai,sans-serif';
    dCtx.textAlign='center'; dCtx.fillText('ยังไม่มีข้อมูลยา',dCtx.canvas.width/2,dCtx.canvas.height/2);
  } else {
    charts.drug = new Chart(dCtx, {
      type:'bar',
      data:{ labels:topD.map(([d])=>d.length>22?d.slice(0,20)+'…':d), datasets:[{ label:'จำนวน', data:topD.map(([,c])=>c), backgroundColor:'rgba(196,154,34,0.75)', borderRadius:3 }] },
      options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true,ticks:{stepSize:1}}} }
    });
  }
}

// ═══ TABLE ═══════════════════════════════════════════════════════
function renderTable(fRecs) {
  const wrap = document.getElementById('tbl-wrap');
  if (!fRecs.length) {
    wrap.innerHTML = '<div class="empty-state"><p>ไม่มีข้อมูล ADR</p><small>เพิ่มรายการผ่านแบบฟอร์มด้านซ้าย หรือ Import จาก HosXP</small></div>';
    return;
  }
  const typeBadge = t => t==='A'?'<span class="badge badge-a">Type A</span>':t==='B'?'<span class="badge badge-b">Type B</span>':t==='G6PD'?'<span class="badge badge-g6pd">G6PD</span>':'<span class="badge badge-na">?</span>';
  const sevBadge = s => {
    if (!s || s==='ยังไม่ทราบ') return `<span class="badge badge-na">${s||'-'}</span>`;
    if (s.includes('ไม่ร้ายแรง')||s.includes('Non-serious')) return '<span class="badge badge-mild">ไม่ร้ายแรง</span>';
    if (s.includes('เสียชีวิต')||s.includes('Death')) return '<span class="badge badge-sev" style="background:#18181b;color:#fff">เสียชีวิต</span>';
    if (s.includes('อันตรายถึงชีวิต')||s.includes('Life-threat')) return '<span class="badge badge-sev">Life-threatening</span>';
    if (s.includes('Hospitalization-initial')||s.includes('เข้ารับการรักษา')) return '<span class="badge badge-sev">Hospitalize-initial</span>';
    if (s.includes('Hospitalization-prolonged')||s.includes('เพิ่มระยะเวลา')) return '<span class="badge badge-mod">Hospitalize-prolonged</span>';
    if (s.includes('พิการ')||s.includes('Disability')) return '<span class="badge badge-sev">พิการ</span>';
    if (s.includes('แต่กำเนิด')||s.includes('Congenital')) return '<span class="badge badge-mod">Congenital anomaly</span>';
    return `<span class="badge badge-na">${s}</span>`;
  };

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>วันที่</th><th>HN / ชื่อ</th>
          <th>ยา / ผลิตภัณฑ์</th><th>ชนิด</th>
          <th>ลักษณะอาการ</th><th>ความร้ายแรง</th><th></th>
        </tr>
      </thead>
      <tbody>
        ${fRecs.map(r=>`
          <tr class="${!r.symptom?'missing-symptom':''}">
            <td style="white-space:nowrap">${thDate(r.date)}</td>
            <td><strong>${r.hn||'-'}</strong>${r.name?`<br><small style="color:var(--text-light)">${r.name}</small>`:''}</td>

            <td>${r.drug||'-'}</td>
            <td>${typeBadge(r.type)}</td>
            <td>${r.symptom||'<span class="badge badge-warn">⚠️ ยังไม่ระบุ</span>'}</td>
            <td>${sevBadge(r.severity)}</td>
            <td style="white-space:nowrap">
              <button class="btn-edit" onclick="editRecord('${r.id}')" title="แก้ไข">✏️</button>
              <button class="btn-del" onclick="deleteRecord('${r.id}')" title="ลบ">🗑️</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}
